services:
  mysql55:
    image: mysql:5.5
    container_name: restore_check_mysql55
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb
    ports:
      - "13306:3306"
    volumes:
      - ./docker/mysql55/init:/docker-entrypoint-initdb.d
      - mysql55_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 30

  mariadb11:
    image: mariadb:11.4
    container_name: restore_check_mariadb11
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: testdb
    ports:
      - "13307:3306"
    volumes:
      - mariadb11_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  mysql55_data:
  mariadb11_data:
